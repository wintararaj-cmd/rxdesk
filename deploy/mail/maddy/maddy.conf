# Maddy configuration file (v0.7+)
# Standard setup for DocNear (RxDesk)

$(hostname) = {env:MADDY_HOSTNAME}
$(primary_domain) = {env:MADDY_DOMAIN}
$(local_domains) = $(primary_domain)

$(local_authdb) = sqlitedb {
    driver sqlite3
    dsn /data/maddy.db
}

# ----------------------------------------------------------------------------
# TLS Configuration
# Provide paths to your certificates if available.
# Maddy will try to load them from /data/tls by default in this config.
tls {
    loader file /data/tls/fullchain.pem /data/tls/privkey.pem
}

# ----------------------------------------------------------------------------
# Authentication and Storage

auth.pass_table local_authdb {
    table users
}

storage.imapsql local_mailboxes {
    driver sqlite3
    dsn /data/maddy.db
}

# ----------------------------------------------------------------------------
# Submission (SMTP for local users) - Port 587
# Uses TLS and Auth

endpoint.submission submission {
    bind :587
    auth local_authdb
    source $(primary_domain) {
        check {
            authorize_sender
        }
        destination postmaster {
             deliver_to &local_mailboxes
        }
        destination $(local_domains) {
             deliver_to &local_mailboxes
        }
        destination * {
             deliver_to &remote_queue
        }
    }
}

# Inbound SMTP (Receiving from internet) - Port 25
endpoint.smtp mx_inbound {
    bind :25
    source * {
        destination postmaster {
             deliver_to &local_mailboxes
        }
        destination $(local_domains) {
             deliver_to &local_mailboxes
        }
        destination * {
             reject "Recipient address is not local"
        }
    }
}

# IMAP Endpoint - Port 143 (StartTLS supported)
endpoint.imap imap_endpoint {
    bind :143
    auth local_authdb
    storage &local_mailboxes
}

# SMTPS (Port 465)
endpoint.smtps smtps_endpoint {
    bind :465
    auth local_authdb
    # Same logic as submission
    source $(primary_domain) {
        check {
            authorize_sender
        }
        destination * {
             deliver_to &remote_queue
        }
    }
}

# ----------------------------------------------------------------------------
# Remote Sending Logic

target.remote remote_queue {
    limits {
        max_conns 10
    }
}

# ----------------------------------------------------------------------------
# Logging

log stderr
