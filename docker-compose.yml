version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rxdesk_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rxdesk_dev
      POSTGRES_USER: rxdesk
      POSTGRES_PASSWORD: rxdesk_secret
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rxdesk -d rxdesk_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rxdesk_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: rxdesk_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  pgdata:
  redisdata:
